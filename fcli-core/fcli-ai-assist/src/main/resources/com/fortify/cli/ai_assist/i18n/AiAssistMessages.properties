fcli.ai-assist.usage.header = (PREVIEW) Manage AI assistant integrations
fcli.ai-assist.usage.description = Manage AI-related functionality like MCP servers and skills.

# fcli ai-assist extensions
fcli.ai-assist.extensions.usage.header = (PREVIEW) Manage Fortify extensions for AI coding assistants
fcli.ai-assist.extensions.usage.description = Set up, uninstall, or check status of Fortify extensions (skills, agents, plugins) for AI coding assistants like Claude Code, GitHub Copilot, OpenAI Codex, and Gemini CLI.
fcli.ai-assist.extensions.setup.usage.header = Set up Fortify extensions for coding assistants
fcli.ai-assist.extensions.setup.usage.description = Set up Fortify extensions (skills, agents, plugins) for AI coding \
  assistants. This command is idempotent: it installs extensions if not present, or updates them if already installed \
  (adding new files, updating changed files, removing obsolete files).%n\
  %nExactly one of --assistants, --auto-detect, or --dir must be specified:%n\
  - --assistants: explicitly name the coding assistants to target%n\
  - --auto-detect: let fcli discover installed assistants via heuristic checks%n\
  - --dir: install content directly to a specific directory (requires --content-types)%n\
  %nTARGET DIRECTORY DEDUPLICATION: When multiple assistants share a target directory for the same content type, \
  extensions are installed only once to that directory. This avoids duplicate entries that some AI assistants would \
  see if extensions were present in multiple locations. For example, if extensions are set up for both VS Code \
  (GitHub Copilot) and Claude Code, skills may be installed to ~/.claude/skills only, since VS Code also processes \
  that directory by default. The setup output marks such shared directories as EXISTING for the second assistant.%n\
  %nNOTE: Auto-detection uses heuristic checks (directory and command existence) which may produce false positives \
  from stale directories of previously uninstalled tools, or miss IDE-embedded assistants (e.g., Copilot in Eclipse). \
  For reliable results, use --assistants to explicitly specify your active assistants. Run \
  'fcli ai-assist extensions list-assistants --detect' to preview detection results before using --auto-detect.
fcli.ai-assist.extensions.setup.output.table.args = assistant,contentType,targetDir,fileCount,__action__
fcli.ai-assist.extensions.uninstall.usage.header = Remove installed Fortify extensions
fcli.ai-assist.extensions.uninstall.usage.description = Remove previously installed Fortify extensions and clean up \
  fcli state. By default, scans both the distribution descriptor and fcli state to find all target directories. \
  Use --dir to remove extensions from a specific directory instead. Use --content-types to remove only specific \
  content types.
fcli.ai-assist.extensions.uninstall.dir = Remove extensions from a specific directory only, without affecting \
  fcli state or other directories.
fcli.ai-assist.extensions.uninstall.output.table.args = contentType,targetDir,fileCount,__action__
fcli.ai-assist.extensions.list-versions.usage.header = List available extension versions
fcli.ai-assist.extensions.list-versions.usage.description = List all available versions of Fortify AI assistant extensions from the tool definitions, including aliases and stability status.
fcli.ai-assist.extensions.list-versions.output.table.args = version,aliases,stable
fcli.ai-assist.extensions.list-installed.usage.header = List installed extensions
fcli.ai-assist.extensions.list-installed.usage.description = List currently installed Fortify extensions per coding assistant and content type.
fcli.ai-assist.extensions.list-installed.output.table.args = assistant,contentType,targetDir,fileCount,sourceVersion
fcli.ai-assist.extensions.list-assistants.usage.header = List supported AI coding assistants
fcli.ai-assist.extensions.list-assistants.usage.description = List all AI coding assistants defined in the distribution descriptor, showing supported content types, detection status, and installation status. Use --detect to run actual detection checks (glob/command).
fcli.ai-assist.extensions.list-assistants.output.table.args = id,name,contentTypesString,detected,installed

# Shared option descriptions for extensions commands
fcli.ai-assist.extensions.assistants = Specify which assistants to target (e.g., --assistants claude,copilot). Mutually exclusive with --auto-detect and --dir.
fcli.ai-assist.extensions.auto-detect = Auto-detect installed assistants using heuristic checks. Mutually exclusive with --assistants and --dir.
fcli.ai-assist.extensions.version = Extension version to install or update to (e.g., 1.0.0, latest, stable). Default: latest.
fcli.ai-assist.extensions.source = Extensions source: local zip file or local directory. Overrides version resolution from tool definitions.
fcli.ai-assist.extensions.dir = Install content to a specific directory, bypassing assistant selection. Requires --content-types. Mutually exclusive with --assistants and --auto-detect.
fcli.ai-assist.extensions.content-types = Filter by content type: skills, agents, plugins. Default: all. Required with --dir.
fcli.ai-assist.extensions.on-digest-mismatch = Action when downloaded zip digest does not match tool definitions: warn, fail. Default: fail.
fcli.ai-assist.extensions.dry-run = Show what would be done without performing any changes.
fcli.ai-assist.extensions.detect = Run detection checks (glob patterns, command existence) to determine which assistants are present. Without this flag, detected column shows N/A.

# fcli ai-assist mcp
fcli.ai-assist.mcp.usage.header = (PREVIEW) Manage fcli MCP server commands for AI assistants
fcli.ai-assist.mcp.usage.description = Start fcli MCP servers for AI assistants, and generate HTTP MCP server config templates.
fcli.ai-assist.mcp.start-stdio.usage.header = (PREVIEW) Start fcli MCP server on stdio for AI integration
fcli.ai-assist.mcp.start-stdio.usage.description = Start the fcli MCP server over stdio. This command exposes fcli module commands and/or \
  imported action functions as MCP tools to AI clients.%n\
  %nTHREAD MODEL:%n\
  - Work threads (--work-threads): execute MCP tool calls. Each concurrent tool call occupies one thread for its\n\
    full duration. Size to the maximum number of tool calls the AI may invoke in parallel.%n\
  - Progress threads (--progress-threads): poll progress for long-running jobs at regular intervals. One thread\n\
    is consumed per active long-running job during each poll. The default of 4 is sufficient for most use cases.%n\
  - Async background threads (--async-bg-threads): run background async streaming jobs (e.g. run.fcli steps\n\
    with streaming output). Increase if actions make heavy use of async streaming.%n
fcli.ai-assist.mcp.start-stdio.module = Fcli module to expose through this MCP server instance.
fcli.ai-assist.mcp.start-stdio.import = Action YAML files to import. Exported functions are registered as MCP tools or resources based on function metadata.
fcli.ai-assist.mcp.start-stdio.work-threads = Number of worker threads used to execute MCP tool jobs concurrently. Increase for higher parallelism if AI invokes multiple tools simultaneously.
fcli.ai-assist.mcp.start-stdio.progress-threads = Number of threads used for updating and tracking job progress for long-running jobs.
fcli.ai-assist.mcp.start-stdio.job-safe-return = Maximum time to wait synchronously for a job result before returning an in_progress placeholder. Specify duration like 25s, 2m, 1h.
fcli.ai-assist.mcp.start-stdio.progress-interval = Interval between internal progress counter updates for long-running jobs. Specify duration (e.g. 500ms, 1s, 2s).
fcli.ai-assist.mcp.start-stdio.async-bg-threads = Number of background threads for running async streaming jobs. Default: 2.

fcli.ai-assist.mcp.start-http.usage.header = (PREVIEW) Start import-only HTTP fcli MCP server for AI integration
fcli.ai-assist.mcp.start-http.usage.description = Start an HTTP MCP server exposing only exported functions from imported action YAML files defined in a config file. Generate a sample config file with 'fcli ai-assist mcp create-http-config --type <ssc|fod>' and customize the generated YAML for your environment. The server listens for MCP POST requests on the /mcp endpoint. Each request must include the product-specific auth header as semicolon-separated key=value pairs; escape literal '\\', ';', or '=' characters as '\\\\', '\\;', or '\\='.\
	%n%nAUTH HEADERS (per HTTP request):\
	%n- SSC mode: X-AUTH-SSC: token=<sscToken>[;sc-sast-token=<scSastClientAuthToken>]\
	%n- FoD mode, user/PAT auth: X-AUTH-FOD: tenant=<tenant>;user=<user>;pat=<pat>\
	%n- FoD mode, client auth: X-AUTH-FOD: client-id=<clientId>;client-secret=<clientSecret>\
	%nExactly one FoD auth mode must be specified per request.
fcli.ai-assist.mcp.start-http.config = Path to HTTP MCP YAML config file. Generate a template with 'fcli ai-assist mcp create-http-config'.

fcli.ai-assist.mcp.create-http-config.usage.header = Generate a sample HTTP MCP server config file
fcli.ai-assist.mcp.create-http-config.usage.description = Create a sample HTTP MCP config file for the selected product type.
fcli.ai-assist.mcp.create-http-config.type = Product type for template generation: ssc or fod.
fcli.ai-assist.mcp.create-http-config.config = Output path for the generated config file. Default: mcp-http-config.yaml.
fcli.ai-assist.mcp.create-http-config.force = Overwrite an existing config file if it already exists.
