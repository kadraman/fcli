# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

author: Fortify
usage:
  header: Apply Aviator remediations and push them to a new branch
  description: |
    This action applies Aviator-generated remediations to the local source code, then
    commits and pushes only those changes to a new branch on the remote repository.

    Change detection is snapshot-based: any files that were already modified before the
    remediations were applied (for example build output) are left untouched; only the
    files changed by the remediation step are committed.

    Configuration via CLI options or environment variables:
    - `--source-dir` / `SOURCE_DIR`       -- Source directory to apply remediations to (default: '.')
    - `--artifact-id`                     -- SSC artifact id to retrieve remediations for
    - `--branch-name` / `BRANCH_NAME`     -- Full branch name to create and push
    - `--commit-message` / `COMMIT_MESSAGE`
    - `--author-name` / `GIT_AUTHOR_NAME`
    - `--author-email` / `GIT_AUTHOR_EMAIL`

    Authentication for the push uses the `GIT_PUSH_TOKEN` environment variable if set,
    falling back to the token of the active CI system, and finally to the local git
    configuration (for example an http.extraHeader injected by the CI checkout step).

config:
  output: immediate

cli.options:
  sourceDir:
    names: --source-dir, -s
    description: "Source directory to apply remediations to. Defaults to current working directory."
    required: false
    default: "${#env('SOURCE_DIR')?:'.'}"
  artifactId:
    names: --artifact-id
    description: "SSC artifact id to retrieve remediations for."
    required: true
  branchName:
    names: --branch-name
    description: "Full branch name to create and push."
    required: false
    default: "${#env('BRANCH_NAME')?:'aviator/remediations/'+#formatDateTime('yyyyMMdd-HHmmss-SSS')}"
  commitMessage:
    names: --commit-message, -m
    description: "Git commit message."
    required: false
    default: "${#env('COMMIT_MESSAGE')?:'fix: apply automated fixes [generated by fcli aviator]'}"
  authorName:
    names: --author-name
    description: "Git author name for the commit."
    required: false
    default: "${#env('GIT_AUTHOR_NAME')?:'fcli-aviator[bot]'}"
  authorEmail:
    names: --author-email
    description: "Git author email for the commit."
    required: false
    default: "${#env('GIT_AUTHOR_EMAIL')?:'fcli-aviator@opentext.com'}"

steps:
  # Validate that the source directory is a git working tree with a configured remote
  - var.set:
      gitRepoInfo: ${#git.localRepo(cli.sourceDir)}
  - if: ${#isBlank(gitRepoInfo)}
    throw: "Source directory '${cli.sourceDir}' is not a git repository."
  - if: ${#isBlank(gitRepoInfo.repository.remoteUrl)}
    throw: "Git repository has no remote URL configured; a remote is required to push remediations."

  # Snapshot the paths that are already dirty before remediations are applied, so that
  # pre-existing changes (e.g. build output) are excluded from the remediation commit.
  - var.set:
      snapshot: ${#git.status(cli.sourceDir)}

  # Apply the Aviator remediations to the local source code
  - run.fcli:
      APPLY_REMEDIATIONS:
        cmd: aviator ssc apply-remediations "--source-dir=${cli.sourceDir}" "--artifact-id=${cli.artifactId}" "--progress=none"
        status.check: true

  # Commit only the changes introduced by the remediation step to a new branch
  - var.set:
      commitSha: ${#git.commitChangesSince(cli.sourceDir, snapshot, cli.branchName, cli.commitMessage, cli.authorName, cli.authorEmail)}
    on.fail:
      - throw:
          msg: "Failed to commit Aviator remediations"
          cause: ${lastException}
  - if: ${#isBlank(commitSha)}
    do:
      - log.info: "No remediation changes to commit; nothing was pushed."
      - exit: 0
  - log.info: "Committed Aviator remediations to branch '${cli.branchName}' (${commitSha})"

  # Push the new branch to the remote repository
  - var.set:
      pushedRef: ${#git.push(cli.sourceDir, cli.branchName)}
    on.fail:
      - throw:
          msg: "Failed to push branch '${cli.branchName}'"
          cause: ${lastException}
  - var.set:
      global.aviatorRemediations.branch: ${cli.branchName}
      global.aviatorRemediations.pushed: true
  - log.info: "Pushed Aviator remediations to branch '${cli.branchName}' (${pushedRef})"
