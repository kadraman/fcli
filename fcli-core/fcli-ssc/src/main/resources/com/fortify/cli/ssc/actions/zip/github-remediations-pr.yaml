# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

author: Fortify
usage:
  header: Apply Aviator remediations and raise a GitHub pull request
  description: |
    This action runs the `push-remediations` action to apply Aviator-generated remediations
    and push them to a new branch, then creates a GitHub pull request for that branch. If the
    remediation step produced no changes, no branch is pushed and no pull request is created.

    Configuration via CLI options or environment variables:
    - `--source-dir` / `SOURCE_DIR`   -- Source directory to apply remediations to (default: '.')
    - `--artifact-id`                 -- SSC artifact id to retrieve remediations for
    - `--branch-name` / `BRANCH_NAME` -- Full branch name to create and push
    - `--base-branch` / `BASE_BRANCH` -- Target branch for the pull request (default: current branch)
    - `--title` / `PR_TITLE`          -- Pull request title
    - `--body` / `PR_BODY`            -- Pull request description

config:
  output: immediate

cli.options:
  sourceDir:
    names: --source-dir, -s
    description: "Source directory to apply remediations to. Defaults to current working directory."
    required: false
    default: "${#env('SOURCE_DIR')?:'.'}"
  artifactId:
    names: --artifact-id
    description: "SSC artifact id to retrieve remediations for."
    required: true
  branchName:
    names: --branch-name
    description: "Full branch name to create and push."
    required: false
    default: "${#env('BRANCH_NAME')?:'aviator/remediations/'+#formatDateTime('yyyyMMdd-HHmmss-SSS')}"
  baseBranch:
    names: --base-branch
    description: "Target branch for the pull request. Defaults to the currently checked-out branch, falling back to the repository default branch or 'main'."
    required: false
    default: "${#env('BASE_BRANCH')?:''}"
  title:
    names: --title, -t
    description: "Pull request title."
    required: false
    default: "${#env('PR_TITLE')?:'fix: Fortify auto-remediation fixes [Generated by fcli aviator]'}"
  body:
    names: --body
    description: "Pull request description."
    required: false
    default: "${#env('PR_BODY')?:'This pull request contains changes applied by fcli aviator.'}"

steps:
  # Capture the currently checked-out branch to use as the pull request base, before
  # push-remediations checks out the new remediation branch.
  - var.set:
      baseBranch: "${#ifBlank(cli.baseBranch, #ifBlank(#git.localRepo(cli.sourceDir)?.branch?.short, #ifBlank(#git.defaultBranch(cli.sourceDir), 'main')))}"

  # Apply remediations and push them to the new branch
  - run.fcli:
      PUSH_REMEDIATIONS:
        cmd: ssc action run push-remediations "--source-dir=${cli.sourceDir}" "--artifact-id=${cli.artifactId}" "--branch-name=${cli.branchName}" "--progress=none"
        status.check: true

  # Only create a pull request if push-remediations actually created and checked out the
  # remediation branch (i.e. there were remediation changes to push).
  - var.set:
      currentBranch: ${#git.localRepo(cli.sourceDir)?.branch?.short}
  - if: ${currentBranch!=cli.branchName}
    do:
      - log.info: "No remediation changes were pushed; skipping pull request creation."
      - exit: 0

  # Create the GitHub pull request
  - var.set:
      pr: ${#github.repo().createPullRequest(cli.title, cli.branchName, baseBranch, cli.body)}
    on.fail:
      - throw:
          msg: "Failed to create GitHub pull request from '${cli.branchName}' to '${baseBranch}'"
          cause: ${lastException}
  - if: "${#isBlank(pr) || #isBlank(pr.html_url)}"
    throw: "GitHub pull request creation did not return the expected response."
  - var.set:
      global.aviatorRemediations.branch: ${cli.branchName}
      global.aviatorRemediations.prUrl: ${pr.html_url}
  - log.info: "Created GitHub pull request #${pr.number}: ${pr.html_url}"
