# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

# For now, github-sast-report and sarif-sast-report actions are exactly the same, apart from the
# following:
# - Different usage information
# - Different default Optional output file name 
# - The sarif-report doesn't impose a limit of 1000 issues
# The reason for having two similar but separate actions is two-fold:
# - We want to explicitly show that fcli supports both GitHub Code Scanning integration (which 
#   just happens to be based on SARIF) and generic SARIF capabilities.
# - Potentially, outputs for GitHub and generic SARIF may deviate in the future, for example if 
#   we want to add SARIF properties that are not supported by GitHub.
# Until the latter situation arises, we should make sure though that both actions stay in sync;
# when updating one, the other should also be updated. and ideally we should have functional tests
# that compare the outputs of both actions. 

author: Fortify
usage:
  header: Integrate SSC SAST results with GitHub Code Scanning.  
  description: |
    This action generates and optionally publishes SSC SAST vulnerabilities to GitHub. 
    With the --publish option, results are automatically uploaded as either SARIF reports 
    (for GitHub Advanced Security) or Check Runs (for free-tier repositories). The optional 
    --type option allows you to specify which format to use.
    
    For manual SARIF file uploads, see 
    https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github

config:
  rest.target.default: ssc
  
cli.options:
  file:
    names: --file, -f
    description: "Optional output file name (or 'stdout' / 'stderr'). Defaults to gh-fortify-sast.sarif if --publish not specified"
    required: false
  publish:
    names: --publish
    description: "Publish report to GitHub Code Scanning (requires GITHUB_TOKEN environment variable with 'security-events: write' permission)"
    required: false
    type: boolean
  type:
    names: --type
    description: "Report type to generate/publish: 'sarif' (GHAS Code Scanning) or 'check-run' (free-tier Check Run). If not specified, tries SARIF first, falls back to Check Run if GHAS unavailable. For best performance, specify the report type that matches your repository's GitHub plan (GHAS vs free tier)."
    required: false
  dryrun:
    names: --dryrun
    description: "Set to true to load and format all data but output to stdout instead of publishing"
    type: boolean
    required: false
    default: false
  appversion:
    names: --appversion, --av
    description: "Required application version id or <appName>:<versionName>"
  filterset:
    names: --filterset, --fs
    description: "Filter set name or guid from which to load issue data. Default value: Default filter set for given application version"
    required: false
  page-size:
    names: --page-size
    description: "Number of vulnerabilities to retrieve at a time. Higher numbers may reduce time required to build the report, at the cost of increased memory usage (on both fcli and SSC), and could potentially negatively affect overall SSC performance or result in read time-outs (see `--socket-timeout` option on `fcli ssc session login` command). Default value: 100"
    required: false
    default: "100"
  workspaceDir:
    names: --workspace-dir
    required: false
    description: "Workspace/repository root directory for resolving Fortify source file paths to workspace-relative paths in reports"
  sourceDir:
    names: --source-dir
    required: false
    description: "Source directory that was scanned - used for prioritizing path matches when multiple files have the same name (e.g., index.js in src/ vs node_modules/)"
  
steps:
  - var.set:
      av: ${#ssc.appVersion(cli.appversion)}
      fs: ${#ssc.filterSet(av, cli.filterset)}
      issueSourceFileResolver: ${#issueSourceFileResolver({workspaceDir:cli.workspaceDir,sourceDir:cli.sourceDir})}
      doOutputSarif: ${cli.type==null || cli.type=='sarif'}
      doOutputCheckRun: ${cli.type==null || cli.type=='check-run'}
      dateFmt: YYYY-MM-dd HH:mm
  - log.progress: Loading latest static scan
  - rest.call:
      artifacts:
        uri:  /api/v1/projectVersions/${av.id}/artifacts
        type: paged
        query:
          embed: scans
        records.for-each:
          record.var-name: artifact
          breakIf: ${lastStaticScan!=null}
          do:
            - var.set:
                lastStaticScan: ${artifact._embed.scans?.^[type=='SCA']}
  - log.progress: Processing issue data
  - rest.call:
      issues:
        uri: /api/v1/projectVersions/${av.id}/issues
        query:
          filter: ISSUE[11111111-1111-1111-1111-111111111151]:SCA
          filterset: ${fs.guid}
          limit: ${cli['page-size']}
        log.progress:
          page.post-process: Processed ${totalIssueCount?:0} of ${issues_raw.count} issues
        on.success:
          - if: ${issues_raw.count>5000}
            throw: GitHub does not support importing more than 5000 vulnerabilities. Please clean the scan results or update vulnerability search criteria.
        records.for-each:
          record.var-name: issue
          embed:
            details:
              uri: /api/v1/issueDetails/${issue.id}
          do:
            - var.set:
                issueCount: ${(issueCount?:0) + 1}
                issueCountBySeverity: {fmt: issueCountIncrement}
            - if: ${doOutputSarif}
              var.set:
                ruleCategories.${issue.primaryRuleGuid}: ${issue.issueName}
                results..: {fmt: results}
            - if: ${doOutputCheckRun && issueSourceFileResolver.exists(issue.fullFileName, issue.lineNumber==0||issue.lineNumber==null?1:issue.lineNumber)}
              var.set:
                checkRunAnnotations..: {fmt: checkRunAnnotation}
  - if: ${doOutputSarif && ruleCategories!=null}
    steps:
      - log.progress: Processing rule data
      - records.for-each:
          from: ${#ssc.ruleDescriptionsProcessor(av.id)}
          record.var-name: rule
          do:
            - if: ${#isNotBlank(ruleCategories[rule.id])}
              var.set:
                rules..: {fmt: rules}
  - if: ${doOutputSarif}
    var.set:
      reportContents: {fmt: github-sast-report}
  - if: ${doOutputCheckRun}
    var.set:
      checkRunBody: {fmt: checkRunBody}
  - var.set:
      reportFile: "${cli.file!=null ? cli.file : cli.publish==true ? null : 'gh-fortify-sast.sarif'}"
  - if: ${reportFile!=null}
    steps:
      - out.write:
          ${reportFile}: ${reportContents}
      - if: ${!{'stdout','stderr'}.contains(reportFile)}
        log.info: Output written to ${reportFile}
  - if: ${cli.publish==true}
    steps:
      - if: ${cli.dryrun}
        steps:
          - if: ${doOutputSarif}
            steps:
              - log.info: |
                  
                  ===== SARIF contents =====
                  ${reportContents}
          - if: ${doOutputCheckRun}
            steps:
              - log.info: |
                  
                  ===== Check Run Body =====
                  ${checkRunBody}
      - if: ${!cli.dryrun && doOutputSarif}
        steps:
          - var.set:
              sarifUploadResult: ${#github.repo().tryUploadSarif(reportContents)}
          - if: ${sarifUploadResult.success}
            log.info: Report published to GitHub Code Scanning
          - if: ${!sarifUploadResult.success && sarifUploadResult.reason!='ghas_unavailable'}
            throw: 'Failed to publish report: ${sarifUploadResult.message}'
      - if: ${!cli.dryrun && doOutputCheckRun && (!doOutputSarif || (!sarifUploadResult.success && sarifUploadResult.reason=='ghas_unavailable'))}
        steps:
          - var.set:
              checkRun: ${#github.repo().createCheckRun(checkRunBody)}
          - log.info: Published as GitHub Check Run

formatters:
  github-sast-report:
      "$schema": https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json 
      version: '2.1.0'
      runs:
        - tool:
            driver:
              name: 'Fortify SCA'   
              version: ${lastStaticScan?.engineVersion?:'unknown'}
              rules: ${rules?:{}}
              properties:
                copyright: ${#copyright()}
                applicationName: ${av.project.name}
                applicationId: ${av.project.id}
                versionName: ${av.name}
                versionId: ${av.id}
          results: ${results?:{}} 
     
  rules:
      id: ${rule.id}
      shortDescription:
        text: ${ruleCategories[rule.id]}
      fullDescription:
        text: |
          ## ${ruleCategories[rule.id]}
          
          ${rule.abstract}
      help:
        text: |
          ${rule.explanation?:'No explanation available'}
          
          ## Recommendations
          
          ${rule.recommendations?:'Not available'}
          
          ## Tips
          
          ${#join('\n\n', rule.tips)?:'Not available'}
          
          ## References
          
          ${#numberedList(rule.references.![title
            +(#isNotBlank(publisher)?", "+publisher:"")
            +(#isNotBlank(author)?", "+author:"")
            +(#isNotBlank(source)?", "+source:"")])?:'Not available'}
            
          ${#copyright()}
        
  results:
      ruleId: ${issue.primaryRuleGuid}
      message: 
        text: ${issue.details?.brief} [More information](${#ssc.issueBrowserUrl(issue,fs)})
      level: ${(issue.friority matches "(Critical|High)") ? "warning":"note" }
      properties:
        security-severity: ${{Critical:10.0,High:8.9,Medium:6.9,Low:3.9}.get(issue.friority)+''}
        fortify-severity: ${issue.friority}
      partialFingerprints:
        issueInstanceId: ${issue.issueInstanceId}
      locations:
        - physicalLocation:
            artifactLocation:
              uri: ${issueSourceFileResolver.resolve(issue.fullFileName)}
            region:
              startLine: ${issue.lineNumber==0||issue.lineNumber==null?1:issue.lineNumber}
              endLine: ${issue.lineNumber==0||issue.lineNumber==null?1:issue.lineNumber}
              startColumn: ${1}  # Needs to be specified as an expression in order to end up as integer instead of string in JSON
              endColumn: ${80}
      codeFlows: |-
        ${ 
          issue.details?.traceNodes==null ? {}
            : 
            {{ 
                threadFlows: issue.details?.traceNodes.![{
                  locations: #this.![{
                    location: {
                        message: {
                            text: text
                        },
                        physicalLocation: {
                            artifactLocation: {
                                uri: #root.issueSourceFileResolver.resolve(fullPath)
                            },
                            region: {
                                startLine: line==0||line==null?1:line
                            }
                        }
                    }
                  }] 
                }] 
            }} 
        }
        
  # Check Run formatters for free-tier GitHub reporting
  checkRunBody:
    name: fortify-sast
    status: completed
    conclusion: success
    output:
      title: Fortify SAST Scan Results
      summary: |
        ## [${av.project.name} - ${av.name}](${#ssc.appversionBrowserUrl(av,null)})

        **Summary generated on:** ${#formatDateTime(dateFmt)}
        **Total Issues in SSC:** ${issueCount?:0}  

        ### Issues by Severity
        
        | Critical | High | Medium | Low |
        |----------|------|--------|-----|
        | ${issueCountBySeverity?.Critical?:0} | ${issueCountBySeverity?.High?:0} | ${issueCountBySeverity?.Medium?:0} | ${issueCountBySeverity?.Low?:0} |
        
        **Note:** Only a subset of issues may be included in the annotations below; for more details and to view all issues, please check the [results in SSC](${#ssc.appversionBrowserUrl(av,fs)}).
      annotations: ${checkRunAnnotations?:{}}
      
  checkRunAnnotation:
    path: ${issueSourceFileResolver.resolve(issue.fullFileName)}
    start_line: ${issue.lineNumber==0||issue.lineNumber==null?1:issue.lineNumber}
    end_line: ${issue.lineNumber==0||issue.lineNumber==null?1:issue.lineNumber}
    annotation_level: notice # GitHub only allows for 10 warn/fail annotations per check run, so we set all annotations to notice and use severity info in the title instead
    title: ${issue.issueName} (${issue.friority})
    message: |
      ${issue.details?.brief}
      ${#ssc.issueBrowserUrl(issue,fs)}
      
  issueCountIncrement:
    Critical: "${issue.friority=='Critical' ? (issueCountBySeverity?.Critical?:0)+1 : (issueCountBySeverity?.Critical?:0)}"
    High: "${issue.friority=='High' ? (issueCountBySeverity?.High?:0)+1 : (issueCountBySeverity?.High?:0)}"
    Medium: "${issue.friority=='Medium' ? (issueCountBySeverity?.Medium?:0)+1 : (issueCountBySeverity?.Medium?:0)}"
    Low: "${issue.friority=='Low' ? (issueCountBySeverity?.Low?:0)+1 : (issueCountBySeverity?.Low?:0)}"