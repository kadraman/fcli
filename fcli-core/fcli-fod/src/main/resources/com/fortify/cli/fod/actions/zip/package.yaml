# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

author: Fortify
usage:
  header: Package source code
  description: |
    This action can be used to package source code using ScanCentral Client. It will 
    take care of installing the specified ScanCentral Client version, followed by
    executing the 'scancentral package' command using the specified ScanCentral 
    Client version. To enable debug logging on the scancentral command, use the
    fcli --debug option, optionally combined with --log-level=NONE to collect
    only ScanCentral logs, not fcli logs.

config:
  output: immediate
  run.fcli.status.log.default: true    # By default, we log all exit statuses
  
cli.options:
  usePackage:
    names: --use-package
    description: |
      Use an existing package file instead of trying to package the given source code directory. If specified, this ignores all other options.
    required: false
    default: ${#env('USE_PACKAGE')}
  scClientVersion:
    names: --sc-client-version, -v
    description: |
      Specify the ScanCentral Client version to be used for packaging. Defaults to the value of the SC_CLIENT_HOME or SC_CLIENT_VERSION environment variables.
      Allowed values:
      - An explicit version number (e.g. 25.2 or 25.2.0)
      - Path to a specific ScanCentral Client installation
      - `latest` to use the latest available ScanCentral Client version
      - `auto` (default) to use a pre-installed version if available, otherwise installs latest
    required: true
    default: ${#ifBlank(#env('SC_CLIENT_HOME'),#ifBlank(#env('SC_CLIENT_VERSION'),'auto'))}
  rel:
    names: --rel
    description: |
      Optional FoD release identifier for automatic detection of Software Composition Analysis (OSS scanning) requirements. When provided, the action will query the release SAST configuration to determine if the `-oss` flag should be added to the packaging command.
    required: false
  sourceDir:
    names: --source-dir, -d
    description: |
      Specify the source directory to be packaged. Defaults to the value of the SOURCE_DIR environment variable, or current working directory if not specified.
    default: ${#ifBlank(#env('SOURCE_DIR'),'.')}
    required: true
  toolDefinitions:
    names: --tool-definitions
    description: |
      Custom tool definitions to use for identifying available ScanCentral Client versions and download URLs.
    required: false
  extraOpts:
    names: --extra-opts
    description: |
      Extra options to be passed to the 'scancentral package' command. Defaults to the options specified in the EXTRA_PACKAGE_OPTS environment variable, or no extra options if not specified. 
    required: false
    default: ${#extraOpts('PACKAGE')}
  output:
    names: --output, -o
    description: |
      Name of the zip file in which packaged source code should be stored. Defaults to package.zip in the current working directory.
    required: true
    default: package.zip
  
      
steps:
  - var.set:
      global.package.output: ${#resolveAgainstCurrentWorkDir(#isNotBlank(cli.usePackage)?cli.usePackage:cli.output)}
  - if: ${#isBlank(cli.usePackage)}
    steps:
      - if: "${#isNotBlank(cli.rel) && !cli.extraOpts.contains('-oss') && !cli.extraOpts.contains(\"'-oss'\") && !cli.extraOpts.contains('\"-oss\"')}"
        run.fcli:
          DETECT_OSS_ENABLED:
            cmd: fcli fod sast get-config --rel "${cli.rel}"
            records.for-each:
              record.var-name: sastConfig
              do:
                - var.set:
                    package.ossEnabled: ${sastConfig.performOpenSourceAnalysis?:false}
            on.success:
              - log.info: 'Software Composition Analysis (OSS scanning) is ${package.ossEnabled?"enabled":"disabled"} in FoD release configuration${package.ossEnabled?", adding -oss flag to packaging command":""}'
            on.fail:
              - log.info: 'Unable to detect OSS scanning configuration, continuing without -oss flag'
              - var.set:
                  DETECT_OSS_ENABLED.status: 'WARNING'
                  DETECT_OSS_ENABLED.statusReason: 'Unable to detect OSS scanning configuration'
                  DETECT_OSS_ENABLED.dependencySkipReason:  # Clear to allow downstream steps
                  DETECT_OSS_ENABLED.exitCode: 0            # Don't contribute to final exit code
                  package.ossEnabled: false
      - var.set:
          effectiveExtraOpts: ${cli.extraOpts}${package.ossEnabled?' -oss':''}
      - run.fcli:
          SETUP_TOOLS: fcli tool env init "--tools=sc-client:${cli.scClientVersion}" ${#opt("--tool-definitions", cli.toolDefinitions)}
          RUN_SC_CLIENT: fcli tool sc-client run --workdir ${cli.sourceDir} --logdir . -- package -o "${global.package.output}" ${effectiveExtraOpts}
      