# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

# For now, github-sast-report and sarif-sast-report actions are exactly the same, apart from the
# following:
# - Different usage information
# - Different default Optional output file name 
# - The sarif-report doesn't impose a limit of 1000 issues
# The reason for having two similar but separate actions is two-fold:
# - We want to explicitly show that fcli supports both GitHub Code Scanning integration (which 
#   just happens to be based on SARIF) and generic SARIF capabilities.
# - Potentially, outputs for GitHub and generic SARIF may deviate in the future, for example if 
#   we want to add SARIF properties that are not supported by GitHub.
# Until the latter situation arises, we should make sure though that both actions stay in sync;
# when updating one, the other should also be updated. and ideally we should have functional tests
# that compare the outputs of both actions. 

author: Fortify
usage:
  header: Integrate FoD SAST results with GitHub Code Scanning. 
  description: |
    This action generates and optionally publishes FoD SAST vulnerabilities to GitHub. 
    With the --publish option, results are automatically uploaded as either SARIF reports 
    (for GitHub Advanced Security) or Check Runs (for free-tier repositories). The optional 
    --type option allows you to specify which format to use.
    
    For manual SARIF file uploads, see  
    https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github

config:
  rest.target.default: fod
  
cli.options:
  file:
    names: --file, -f
    description: "Optional output file name (or 'stdout' / 'stderr'). Defaults to gh-fortify-sast.sarif if --publish not specified"
    required: false
  publish:
    names: --publish
    description: "Publish report to GitHub Code Scanning (requires GITHUB_TOKEN environment variable with 'security-events: write' permission)"
    required: false
    type: boolean
  type:
    names: --type
    description: "Report type to generate/publish: 'sarif' (GHAS Code Scanning) or 'check-run' (free-tier Check Run). If not specified, tries SARIF first, falls back to Check Run if GHAS unavailable. For best performance, specify the report type that matches your repository's GitHub plan (GHAS vs free tier)."
    required: false
  dryrun:
    names: --dryrun
    description: "Set to true to load and format all data but output to stdout instead of publishing"
    type: boolean
    required: false
    default: false
  release:
    names: --release, --rel
    description: "Required release id or <appName>:[<microserviceName>:]<releaseName>"
  workspaceDir:
    names: --workspace-dir
    required: false
    description: "Workspace/repository root directory for resolving Fortify source file paths to workspace-relative paths in reports"
  sourceDir:
    names: --source-dir
    required: false
    description: "Source directory that was scanned - used for prioritizing path matches when multiple files have the same name (e.g., index.js in src/ vs node_modules/)"

steps:
  - var.set:
      rel: ${#fod.release(cli.release)}
      issueSourceFileResolver: ${#issueSourceFileResolver({workspaceDir:cli.workspaceDir,sourceDir:cli.sourceDir})}
      doOutputSarif: ${cli.type==null || cli.type=='sarif'}
      doOutputCheckRun: ${cli.type==null || cli.type=='check-run'}
  - log.progress: Loading static scan summary
  - rest.call:
      staticScanSummary:
        uri:  /api/v3/scans/${rel.currentStaticScanId}/summary
        if:   ${rel.currentStaticScanId!=null}
        on.fail: 
          - log.warn: Unable to load static scan summary, some scan metadata may be missing from the report
  - log.progress: Processing issue data
  - rest.call:
      issues:
        uri: /api/v3/releases/${rel.releaseId}/vulnerabilities?limit=50
        query:
          filters: scantype:Static
        log.progress:
          page.post-process: Processed ${totalIssueCount?:0} of ${issues_raw.totalCount} issues
        on.success:
          - if: ${issues_raw.totalCount>5000}
            throw: GitHub does not support importing more than 5000 vulnerabilities. Please clean the scan results or update vulnerability search criteria.
        records.for-each:
          record.var-name: issue
          embed:
            details:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/details
            recommendations:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/recommendations
            traces:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/traces 
          do:
            - if: ${doOutputSarif}
              var.set:
                rules..: {fmt: rules, if: "${ruleCache==null || ruleCache[issue.checkId]==null}"}
                ruleCache.${issue.checkId}: true
                results..: {fmt: results}
            - if: ${doOutputCheckRun && issueSourceFileResolver.exists(issue.primaryLocationFull, issue.lineNumber==0?1:issue.lineNumber)}
              var.set:
                checkRunAnnotations..: {fmt: checkRunAnnotation}
  - if: ${doOutputSarif}
    var.set:
      reportContents: {fmt: github-sast-report}
  - if: ${doOutputCheckRun}
    var.set:
      checkRunSummary: {fmt: checkRunSummary}
  - var.set:
      reportFile: "${cli.file!=null ? cli.file : cli.publish==true ? null : 'gh-fortify-sast.sarif'}"
  - if: ${reportFile!=null}
    steps:
      - out.write:
          ${reportFile}: ${reportContents}
      - if: ${!{'stdout','stderr'}.contains(reportFile)}
        log.info: Output written to ${reportFile}
  - if: ${cli.publish==true}
    steps:
      - if: ${cli.dryrun}
        steps:
          - if: ${doOutputSarif}
            steps:
              - log.info: |
                  
                  ===== SARIF contents =====
                  ${reportContents}
          - if: ${doOutputCheckRun}
            steps:
              - log.info: |
                  
                  ===== Check Run Summary =====
                  ${checkRunSummary}
                  
                  ===== Check Run Annotations (${checkRunAnnotations?.getRealNode()?.size()?:0} total) =====
                  ${checkRunAnnotations}
      - if: ${!cli.dryrun && doOutputSarif}
        steps:
          - var.set:
              sarifUploadResult: ${#github.tryUploadSarif(reportContents)}
          - if: ${sarifUploadResult.success}
            log.info: Report published to GitHub Code Scanning
          - if: ${!sarifUploadResult.success && sarifUploadResult.reason!='ghas_unavailable'}
            throw: 'Failed to publish report: ${sarifUploadResult.message}'
      - if: ${!cli.dryrun && doOutputCheckRun && (!doOutputSarif || (!sarifUploadResult.success && sarifUploadResult.reason=='ghas_unavailable'))}
        steps:
          - var.set:
              checkRun: ${#github.createCheckRunWithAnnotations('fortify-sast', 'completed', 'neutral', 'Fortify Security Scan Results', checkRunSummary, checkRunAnnotations)}
          - log.info: Published as GitHub Check Run

formatters:
  github-sast-report:
      "$schema": https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json 
      version: '2.1.0'
      runs:
        - tool:
            driver:
              name: 'Fortify on Demand'   
              version: SCA ${staticScanSummary?.staticScanSummaryDetails?.engineVersion?:'version unknown'}; Rulepack ${staticScanSummary?.staticScanSummaryDetails?.rulePackVersion?:'version unknown'}
              rules: ${rules?:{}}
              properties:
                copyright: ${#copyright()}
                applicationName: ${rel.applicationName}
                applicationId: ${rel.applicationId}
                releaseName: ${rel.releaseName}
                releaseId: ${rel.releaseId}
          results: ${results?:{}}
     
  rules:
      id: ${issue.checkId}
      shortDescription:
        text: ${issue.category}
      fullDescription:
        text: |
          ## ${issue.category}
          
          ${#cleanRuleDescription(issue.details?.summary)}
      help:
        text: |
          ${#cleanRuleDescription(issue.details?.explanation)?:'No explanation available'}
          
          ## Recommendations
          
          ${#cleanRuleDescription(issue.recommendations?.recommendations)?:'Not available'}
          
          ## Tips
          
          ${#cleanRuleDescription(issue.recommendations?.tips)?:'Not available'}
          
          ## References
          
          ${#numberedList(#cleanRuleDescription(issue.recommendations?.references)?.split('\n'))?:'Not available'}
          
          ${#copyright()}

  results:
      ruleId: ${issue.checkId}
      message: 
        text: ${#cleanIssueDescription(issue.details?.summary)} [More information](${#fod.issueBrowserUrl(issue)})
      level: ${(issue.severityString matches "(Critical|High)") ? "warning":"note" }
      properties:
        security-severity: ${{Critical:10.0,High:8.9,Medium:6.9,Low:3.9}.get(issue.severityString)+''}
        fortify-severity: ${issue.severityString}
      partialFingerprints:
        issueInstanceId: ${issue.instanceId}
      locations:
        - physicalLocation:
            artifactLocation:
              uri: ${issueSourceFileResolver.resolve(issue.primaryLocationFull)}
            region:
              startLine: ${issue.lineNumber==0?1:issue.lineNumber}
              endLine: ${issue.lineNumber==0?1:issue.lineNumber}
              startColumn: ${1}  # Needs to be specified as an expression in order to end up as integer instead of string in JSON
              endColumn: ${80}
      codeFlows: |-
        ${ 
          issue.traces==null ? {}
            : 
            {{ 
                threadFlows: issue.traces.![{
                  locations: traceEntries?.![{
                    location: {
                        message: {
                            text: #htmlToText(displayText).replaceAll("&nbsp;", " ")
                        },
                        physicalLocation: {
                            artifactLocation: {
                                uri: #root.issueSourceFileResolver.resolve(location)
                            },
                            region: {
                                startLine: lineNumber==0?1:lineNumber
                            }
                        }
                    }
                  }] 
                }] 
            }} 
        }
        
  # Check Run formatters for free-tier GitHub reporting
  checkRunSummary: |
    ## Fortify SAST Scan Results
    
    **Application:** ${rel.applicationName}  
    **Release:** ${rel.releaseName}  
    **Total Issues:** ${issues?.getRealNode()?.size()?:0}
    
    ### Issues by Severity
    
    | Severity | Count |
    |----------|-------|
    | Critical | ${issues?.^[severityString=='Critical']?.getRealNode()?.size()?:0} |
    | High | ${issues?.^[severityString=='High']?.getRealNode()?.size()?:0} |
    | Medium | ${issues?.^[severityString=='Medium']?.getRealNode()?.size()?:0} |
    | Low | ${issues?.^[severityString=='Low']?.getRealNode()?.size()?:0} |
    
    See annotations below for detailed findings at specific file locations.
    
  checkRunAnnotation:
    path: ${issueSourceFileResolver.resolve(issue.primaryLocationFull)}
    start_line: ${issue.lineNumber==0?1:issue.lineNumber}
    end_line: ${issue.lineNumber==0?1:issue.lineNumber}
    annotation_level: ${(issue.severityString matches "(Critical|High)") ? "warning":"notice"}
    title: ${issue.category}
    message: |
      **${issue.category}** (Severity: ${issue.severityString})
      
      ${#cleanIssueDescription(issue.details?.summary)}
      
      [View in FoD](${#fod.issueBrowserUrl(issue)})
      
