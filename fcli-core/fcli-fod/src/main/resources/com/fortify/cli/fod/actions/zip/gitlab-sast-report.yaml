# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

author: Fortify
usage:
  header: Integrate FoD SAST results with GitLab. 
  description: |
    This action generates and optionally publishes FoD SAST vulnerabilities to GitLab. 
    With the --publish option, results are automatically uploaded to GitLab pipelines.
    
    For manual report uploads, see 
    https://docs.gitlab.com/ee/ci/yaml/artifacts_reports.html#artifactsreportssast

config:
  rest.target.default: fod
  
cli.options:
  file:
    names: --file, -f
    description: "Optional output file name (or 'stdout' / 'stderr'). Defaults to gl-fortify-sast.json if --publish not specified"
    required: false
  publish:
    names: --publish
    description: "Publish report to GitLab Security Dashboard"
    required: false
    type: boolean
  release:
    names: --release, --rel
    description: "Required release id or <appName>:[<microserviceName>:]<releaseName>"
  workspaceDir:
    names: --workspace-dir
    required: false
    description: "Workspace/repository root directory for resolving Fortify source file paths to workspace-relative paths in reports"
  sourceDir:
    names: --source-dir
    required: false
    description: "Source directory that was scanned - used for prioritizing path matches when multiple files have the same name (e.g., index.js in src/ vs node_modules/)"
  
steps:
  - var.set:
      rel: ${#fod.release(cli.release)}
      issueSourceFileResolver: ${#issueSourceFileResolver({workspaceDir:cli.workspaceDir,sourceDir:cli.sourceDir})}
  - log.progress: Loading static scan summary
  - rest.call:
      staticScanSummary:
        uri:  /api/v3/scans/${rel.currentStaticScanId}/summary
        if:   ${rel.currentStaticScanId!=null}
        on.fail: 
          - log.warn: Unable to load static scan summary, some scan metadata may be missing from the report
  - log.progress: Processing issue data
  - rest.call:
      issues:
        uri: /api/v3/releases/${rel.releaseId}/vulnerabilities?limit=50
        query:
          filters: scantype:Static
        log.progress:
          page.post-process: Processed ${totalIssueCount?:0} of ${issues_raw.totalCount} issues
        records.for-each:
          record.var-name: issue
          embed:
            details:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/details
            recommendations:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/recommendations
            traces:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/traces
          do:
            - var.set:
                vulnerabilities..: {fmt: vulnerabilities}
  - var.set:
      reportContents: {fmt: gitlab-sast-report}
      reportFile: "${cli.file!=null ? cli.file : cli.publish==true ? null : 'gl-fortify-sast.json'}"
  - if: ${reportFile!=null}
    steps:
      - out.write:
          ${reportFile}: ${reportContents}
      - if: ${!{'stdout','stderr'}.contains(reportFile)}
        log.info: Output written to ${reportFile}
  - if: ${cli.publish==true}
    steps:
      - var.set:
          gitlabUpload: ${#gitlab.project().uploadSecurityReport('sast', reportContents)}
      - log.info: Report published to GitLab Security Dashboard

formatters:
  gitlab-sast-report:
      schema: https://gitlab.com/gitlab-org/security-products/security-report-schemas/-/raw/v15.2.1/dist/sast-report-format.json
      version: 15.2.1
      scan:
        start_time: ${#formatDateTime("yyyy-MM-dd'T'HH:mm:ss", staticScanSummary?.startedDateTime?:'1970-01-01T00:00:00')}
        end_time: ${#formatDateTime("yyyy-MM-dd'T'HH:mm:ss", staticScanSummary?.completedDateTime?:'1970-01-01T00:00:00')}
        status: ${rel.staticAnalysisStatusTypeId==2?'success':'failure'}
        type: sast
        analyzer:
          id: FoD-SAST
          name: Fortify on Demand
          url: https://www.microfocus.com/en-us/products/application-security-testing/overview
          version: SCA ${staticScanSummary?.staticScanSummaryDetails?.engineVersion?:'version unknown'}; Rulepack ${staticScanSummary?.staticScanSummaryDetails?.rulePackVersion?:'version unknown'}
          vendor:
            name: Fortify
        scanner:
          id: FoD-SAST
          name: Fortify on Demand
          url: https://www.microfocus.com/en-us/products/application-security-testing/overview
          version: SCA ${staticScanSummary?.staticScanSummaryDetails?.engineVersion?:'version unknown'}; Rulepack ${staticScanSummary?.staticScanSummaryDetails?.rulePackVersion?:'version unknown'}
          vendor: 
            name: Fortify
      vulnerabilities: ${vulnerabilities?:{}} 
     
  vulnerabilities:
      id: ${issue.vulnId}
      category: sast
      name: ${issue.category}
      message: ${issue.category}
      description: ${#abbreviate(#htmlToText(issue.details?.summary?:""), 15000)}
      cve: 'N/A'
      severity: ${issue.severityString}
      confidence: ${(issue.severityString matches "(Critical|Medium)") ? "High":"Low" }
      solution: ${#abbreviate(#htmlToText(issue.details?.explanation)+'\n\n'+#htmlToText(issue.recommendations?.recommendations), 7000)}
      scanner:
        id: FoD-SAST
        name: Fortify on Demand
      identifiers: |-
        ${{
            {
              name:  "Instance id: "+issue.instanceId,
              url:   #fod.issueBrowserUrl(issue),
              type:  "issueInstanceId",
              value: issue.instanceId
            }
        }}
      links:
        - name: Additional issue details, including analysis trace, in Fortify on Demand
          url:  ${#fod.issueBrowserUrl(issue)}
      location:
        file:       ${issueSourceFileResolver.resolve(issue.primaryLocationFull)}
        start_line: ${issue.lineNumber==0?1:issue.lineNumber}
      details:
        code_flows: 
          name: Code Flows
          type: code-flows
          items: |-
            ${#normalizeAndMergeTraceNodes(issue.traces).![
                     #this.![{
                       type: 'code-flow-node',
                       node_type: {'SOURCE': 'source', 'SINK': 'sink', '':'propagation'}.get(sourceOrSink),
                       file_location: {
                         type: 'file-location',
                         file_name: #root.issueSourceFileResolver.resolve(path),
                         line_start: line==0||line==null?1:line
                       }
                     }]
                  ]
            }
