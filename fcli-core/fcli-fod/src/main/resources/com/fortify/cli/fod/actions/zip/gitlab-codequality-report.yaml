# yaml-language-server: $schema=https://fortify.github.io/fcli/schemas/action/fcli-action-schema-dev-2.x.json

author: Fortify
usage:
  header: Integrate FoD SAST results with GitLab Code Quality.
  description: |
    This action generates and optionally publishes FoD SAST vulnerabilities to GitLab. 
    With the --publish option, results are automatically uploaded to GitLab pipelines.
    
    For manual report uploads, see 
    https://docs.gitlab.com/ee/ci/yaml/artifacts_reports.html#artifactsreportscodequality

config:
  rest.target.default: fod
  
cli.options:
  file:
    names: --file, -f
    description: "Optional output file name (or 'stdout' / 'stderr'). Defaults to gl-fortify-codequality.json if --publish not specified"
    required: false
  publish:
    names: --publish
    description: "Publish report to GitLab merge request"
    required: false
    type: boolean
  release:
    names: --release, --rel
    description: "Required release id or <appName>:[<microserviceName>:]<releaseName>"
  workspaceDir:
    names: --workspace-dir
    required: false
    description: "Workspace/repository root directory for resolving Fortify source file paths to workspace-relative paths in reports"
  sourceDir:
    names: --source-dir
    required: false
    description: "Source directory that was scanned - used for prioritizing path matches when multiple files have the same name (e.g., index.js in src/ vs node_modules/)"

  
steps:
  - var.set:
      rel: ${#fod.release(cli.release)}
      issueSourceFileResolver: ${#issueSourceFileResolver({workspaceDir:cli.workspaceDir,sourceDir:cli.sourceDir})}
  - log.progress: Processing issue data
  - rest.call:
      issues:
        uri: /api/v3/releases/${rel.releaseId}/vulnerabilities?limit=50
        query:
          filters: scantype:Static
        log.progress:
          page.post-process: Processed ${totalIssueCount?:0} of ${issues_raw.totalCount} issues
        records.for-each:
          record.var-name: issue
          embed:
            details:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/details
            recommendations:
              uri: /api/v3/releases/${rel.releaseId}/vulnerabilities/${issue.vulnId}/recommendations
          do:
            - var.set:
                vulnerabilities..: {fmt: vulnerabilities}
  - var.set:
      reportContents: {fmt: gitlab-codequality-report}
      reportFile: "${cli.file!=null ? cli.file : cli.publish==true ? null : 'gl-fortify-codequality.json'}"
  - if: ${reportFile!=null}
    steps:
      - out.write:
          ${reportFile}: ${reportContents}
      - if: ${!{'stdout','stderr'}.contains(reportFile)}
        log.info: Output written to ${reportFile}
  - if: ${cli.publish==true}
    steps:
      - var.set:
          gitlabUpload: ${#gitlab.project().uploadCodeQualityReport(reportContents)}
      - log.info: Report published to GitLab merge request

formatters:
  gitlab-codequality-report:
      ${vulnerabilities?:{}} 
     
  vulnerabilities:
      description: ${#abbreviate(#htmlToText(issue.details?.summary?:""), 5000)}
      check_name: ${issue.category}
      fingerprint: ${issue.instanceId}
      location:
          path: ${issueSourceFileResolver.resolve(issue.primaryLocationFull)}
          lines: 
              begin: ${issue.lineNumber==0?1:issue.lineNumber}
      severity: ${issue.severityString}
