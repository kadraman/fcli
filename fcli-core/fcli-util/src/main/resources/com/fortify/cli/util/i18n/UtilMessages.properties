# fcli util
# TODO Provide more details in usage description, after deciding whether the license-related
# commands should stay in this module, or moved to a new, separate module.
fcli.util.usage.header = Utility commands that don't fit in any of the other modules.
fcli.util.usage.description = This module provides various utility commands that don't fit in any of the other fcli modules. 

# fcli util all-commands
fcli.util.all-commands.usage.header = List and display help information for all fcli commands.
fcli.util.all-commands.list.usage.header = List (a subset of) all fcli commands.
fcli.util.all-commands.list.usage.description = By default, this command outputs a table listing all available fcli commands. The --query option can be used to output a subset of commands.
fcli.util.all-commands.list.query.0 = Only display records for which the given Spring Expression Language (SpEL) expression returns true. See the output of '-o json-properties' for the list of properties that you can query on. Common queries include the following:
fcli.util.all-commands.list.query.1 = -q '!hidden' (only non-hidden commands)
fcli.util.all-commands.list.query.2 = -q 'hidden' (only hidden commands)
fcli.util.all-commands.list.query.3 = -q '!runnable' (only container commands)
fcli.util.all-commands.list.query.4 = -q 'runnable' (only runnable commands)
fcli.util.all-commands.list.query.5 = -q '!hidden && runnable' (only non-hidden, runnable commands)
fcli.util.all-commands.list.query.6 = -q 'module=="config"' (only 'config' commands)
fcli.util.all-commands.usage.usage.header = Display usage information for (a subset of) all fcli commands.
fcli.util.all-commands.usage.usage.description = By default, this command outputs the usage information for every individual fcli command, similar to manually invoking each command with the --help option. The --query option can be used to only display usage information for a subset of commands.
fcli.util.all-commands.usage.query.0 = Only display usage information for commands that match the given Spring Expression Language (SpEL) expression. See the output of 'fcli util all-commands list -o json-properties' for the list of properties that you can query on. Common queries include the following: 
fcli.util.all-commands.usage.query.1 = -q '!hidden' (only non-hidden commands)
fcli.util.all-commands.usage.query.2 = -q 'hidden' (only hidden commands)
fcli.util.all-commands.usage.query.3 = -q '!runnable' (only container commands)
fcli.util.all-commands.usage.query.4 = -q 'runnable' (only runnable commands)
fcli.util.all-commands.usage.query.5 = -q '!hidden && runnable' (only non-hidden, runnable commands)
fcli.util.all-commands.usage.query.6 = -q 'module=="config"' (only 'config' commands) 

# fcli util auto-complete
fcli.util.auto-complete.usage.header = Manage fcli auto-completion scripts.
fcli.util.auto-complete.generate.usage.header = Generate fcli auto-completion script.
fcli.util.auto-complete.generate.usage.description.0 = Generate bash/zsh completion script for ${ROOT-COMMAND-NAME:-the root command of this command}. 
fcli.util.auto-complete.generate.usage.description.1 = Run the following command to give `${ROOT-COMMAND-NAME:-$PARENTCOMMAND}` TAB completion in the current shell:
fcli.util.auto-complete.generate.usage.description.2 = \u0020\u0020source <(${PARENT-COMMAND-FULL-NAME:-$PARENTCOMMAND} ${COMMAND-NAME})

# fcli util crypto
fcli.util.crypto.usage.header = Encrypt and decrypt data.
fcli.util.crypto.usage.description.0 = These commands allow for encrypting and decrypting string values using fcli built-in encryption mechanism and password. The password can be customized through the FCLI_ENCRYPT_KEY environment variable, obviously the same password should be configured during encryption and decryption.
fcli.util.crypto.usage.description.1 = Note that for now, encryption and decryption is not compatible with Fortify's pwtool utility. These commands are mainly meant to allow encrypted passwords to be stored in fcli configuration files, for example as used by the 'fcli license msp-report' and 'fcli license ncd-report' commands.
fcli.util.crypto.encrypt.usage.header = Encrypt a value.
fcli.util.crypto.encrypt.prompt = Value to encrypt:
fcli.util.crypto.decrypt.usage.header = Decrypt a value.
fcli.util.crypto.decrypt.prompt = Value to decrypt:

# fcli util mcp-server
fcli.util.mcp-server.usage.header = (DEPRECATED) Legacy MCP server compatibility commands
fcli.util.mcp-server.start.usage.header = (DEPRECATED) Start legacy fcli MCP server command
fcli.util.mcp-server.start.usage.description = This command is deprecated and kept only for backward compatibility. Use 'fcli agent mcp start-stdio' instead. All given arguments are forwarded to the new command.
fcli.util.mcp-server.start.module = Fcli module to expose through this MCP server instance.
fcli.util.mcp-server.start.import = Action YAML files to import. Exported functions are registered as MCP tools or resources based on function metadata.
fcli.util.mcp-server.start.work-threads = Number of worker threads used to execute MCP tool jobs concurrently. Increase for higher parallelism if LLM invokes multiple tools simultaneously.
fcli.util.mcp-server.start.progress-threads = Number of threads used for updating and tracking job progress for long-running jobs.
fcli.util.mcp-server.start.job-safe-return = Maximum time to wait synchronously for a job result before returning an in_progress placeholder. Specify duration like 25s, 2m, 1h.
fcli.util.mcp-server.start.progress-interval = Interval between internal progress counter updates for long-running jobs. Specify duration (e.g. 500ms, 1s, 2s).
fcli.util.mcp-server.start.async-bg-threads = Number of background threads for running async streaming jobs. Default: 2.
fcli.util.mcp-server.start-http.usage.header = (PREVIEW) Start import-only HTTP fcli MCP server for LLM integration
fcli.util.mcp-server.start-http.usage.description = Start an HTTP MCP server exposing only exported functions from imported action YAML files defined in a config file. This command uses an embedded JDK HTTP server and serves MCP requests on /mcp. Although the Java MCP SDK provides built-in HTTP transports in the core module, those transports are servlet-based and still require a servlet container/runtime; fcli uses JDK HttpServer to avoid adding servlet/container dependencies and to reduce native-image integration risk.\
  %n%nAUTH HEADERS (per HTTP request):\
  %n- SSC mode: required X-FCLI-SSC-TOKEN, optional X-FCLI-SC-SAST-CLIENT-AUTH-TOKEN (used if not set in server config).\
  %n- FoD mode, user/PAT auth: X-FCLI-FOD-TENANT, X-FCLI-FOD-USER, X-FCLI-FOD-PAT.\
  %n- FoD mode, client auth: X-FCLI-FOD-CLIENT-ID, X-FCLI-FOD-CLIENT-SECRET.\
  %nExactly one FoD auth mode must be specified per request.\
  %n%nCONFIG FILE STRUCTURE (YAML):\
  %nSpecify exactly one of the 'ssc' or 'fod' sections; product is inferred from section presence. Each product section also supports optional connection settings: insecureModeEnabled, connectTimeout, socketTimeout. If omitted, defaults match the existing session login commands for that product.\
  %n%nSSC example:\
  %nport: 8080\
  %nimports:\
  %n  - actions/http-ssc.yaml\
  %nssc:\
  %n  url: https://ssc.example.com\
  %n  connectTimeout: 30s\
  %n  socketTimeout: 10m\
  %n  insecureModeEnabled: false\
  %n  scSastClientAuthToken: ${#env('SSC_SAST_CLIENT_AUTH_TOKEN')}\
  %n%nFoD example:\
  %nport: 8080\
  %nimports:\
  %n  - actions/http-fod.yaml\
  %nfod:\
  %n  url: https://api.ams.fortify.com\
  %n  connectTimeout: 30s\
  %n  socketTimeout: 10m\
  %n  insecureModeEnabled: false\
  %n%nOptional runtime settings (with defaults): workThreads=10, progressThreads=4, asyncBgThreads=2, jobSafeReturn=25s, progressInterval=5s
fcli.util.mcp-server.start-http.config = Path to HTTP MCP YAML config file.

# fcli util rpc-server
fcli.util.rpc-server.usage.header = (PREVIEW) Manage fcli JSON-RPC server for IDE plugin integration
fcli.util.rpc-server.usage.description = %nThe JSON-RPC server is currently considered preview functionality, \
  and only meant to be used by Fortify-provided IDE plugins. Once the RPC interface has matured, we may be exposing \
  this as a supported integration option for other third-party integrations as well.%n
fcli.util.rpc-server.start.usage.header = (PREVIEW) Start fcli JSON-RPC server for IDE plugin integration
fcli.util.rpc-server.start.usage.description = %nThe JSON-RPC server is currently considered preview functionality, \
  and only meant to be used by Fortify-provided IDE plugins. Once the RPC interface has matured, we may be exposing \
  this as a supported integration option for other third-party integrations as well. \
  %n%nThe fcli JSON-RPC server provides a simple JSON-RPC 2.0 interface \
  for IDE plugins and other tools to interact with Fortify products through fcli. Unlike the MCP server which is \
  designed for LLM integration, the RPC server exposes a smaller set of general-purpose methods suitable for \
  programmatic access from IDE plugins.%n%n\
  The server reads JSON-RPC 2.0 requests from stdin and writes responses to stdout, one JSON object per line. \
  %n%nTHREAD MODEL: The RPC server uses a single async background thread pool (--async-bg-threads, default: 4). \
  Each active async streaming job occupies one background thread. Increase if IDE clients submit many \
  concurrent async commands.%n\
  %n\
  %nAVAILABLE RPC METHODS\
  %n\
  %n- FCLI METHODS (fcli.*):\
  %n\
  %n  fcli.execute:\
  %n    Execute an fcli command asynchronously\
  %n    Parameters:\
  %n      - command (string, required)\
  %n        The fcli command to execute (e.g., "ssc appversion list")\
  %n      - collectRecords (boolean, optional)\
  %n        By default, stdout is suppressed and records are collected\
  %n        if supported by the fcli command, unless this parameter is\
  %n        set to false.\
  %n      - cache (object, optional)\
  %n        Enable record caching for retrieval via job.getPage.\
  %n        Omitted: no caching.\
  %n        {ttl: "<period>"}: cache with specified TTL (e.g., "30s",\
  %n        "5m", "1h", "1d"). TTL is required.\
  %n        Cached records are automatically evicted after TTL.\
  %n        Use job.remove to clear the cache before TTL expires.\
  %n      - push (boolean, optional, default: true)\
  %n        Enable push notifications (job.started, job.records,\
  %n        job.progress, job.complete). Set to false to disable all\
  %n        push notifications and rely on job.getStatus/job.getPage\
  %n        for polling.\
  %n      - wait (boolean|object, optional)\
  %n        Wait for job completion and return results inline.\
  %n        Omitted or false: async (default, returns jobId).\
  %n        true or {}: wait indefinitely for completion.\
  %n        {timeout: "<period>"}: wait up to the given duration\
  %n        (e.g., "30s", "5m"). If the timeout elapses before\
  %n        completion, falls back to the async response (jobId).\
  %n    Response (async, default):\
  %n      jobId, status="started", jobType ("records" or "stdout"),\
  %n      cached (boolean)\
  %n    Response (wait, on completion):\
  %n      status ("completed" or "failed"), exitCode,\
  %n      stderr (if any), stdout (if any),\
  %n      records (array, if collectRecords), recordCount\
  %n\
  %n  fcli.listCommands:\
  %n    List available fcli commands with optional SpEL query filtering\
  %n    Parameters:\
  %n      - query (string, optional)\
  %n        SpEL expression to filter commands (e.g., '!hidden && runnable',\
  %n        'module=="ssc"'). See 'fcli util all-commands list -o json' for\
  %n        available properties.\
  %n    Response:\
  %n      commands (array of command descriptors), count\
  %n\
  %n  fcli.getCommandDetails:\
  %n    Get detailed spec and argument information for a specific fcli command\
  %n    Parameters:\
  %n      - command (string, required)\
  %n        The fcli command to describe (e.g., "ssc appversion list")\
  %n    Response:\
  %n      command, commandSpec, commandArgs\
  %n\
  %n  fcli.buildInfo:\
  %n    Get fcli build information\
  %n    Parameters: none\
  %n    Response:\
  %n      projectName, version, buildDate, actionSchemaVersion, actionSchemaUrl, docBaseUrl, sourceCodeBaseUrl\
  %n\
  %n- FUNCTION METHODS (fn.*) - only available when --import is used:\
  %n\
  %n  fn.call:\
  %n    Call an imported action function asynchronously\
  %n    Parameters:\
  %n      - name (string, required)\
  %n        Function name (see fn.list)\
  %n      - args (object, optional)\
  %n        Function arguments as key/value pairs\
  %n      - cache (object, optional)\
  %n        Enable record caching for retrieval via job.getPage.\
  %n        Same options as fcli.execute cache parameter.\
  %n      - push (boolean, optional, default: true)\
  %n        Enable push notifications. Same as fcli.execute push\
  %n        parameter.\
  %n      - wait (boolean|object, optional)\
  %n        Wait for completion. Same as fcli.execute wait parameter.\
  %n    Response (async, default):\
  %n      jobId, status="started", jobType="records",\
  %n      cached (boolean)\
  %n    Response (wait, on completion):\
  %n      status ("completed" or "failed"), exitCode,\
  %n      stderr (if any), stdout (if any),\
  %n      records (array), recordCount\
  %n\
  %n  fn.list:\
  %n    List available imported action functions\
  %n    Parameters: none\
  %n    Response:\
  %n      functions (array of {name, description, streaming}), count\
  %n\
  %n- JOB METHODS (job.*):\
  %n\
  %n  job.getPage:\
  %n    Retrieve a page of records from a running or completed job.\
  %n    Only available for jobs started with cache enabled.\
  %n    Returns status="not_found" if caching was not enabled or\
  %n    if the cache has been evicted (TTL expired).\
  %n    Parameters:\
  %n      - jobId (string, required)\
  %n        Job ID from fcli.execute or fn.call\
  %n      - offset (integer, optional)\
  %n        Start offset (default: 0)\
  %n      - limit (integer, optional)\
  %n        Max records per page (default: 100)\
  %n    Response:\
  %n      status ("complete", "loading", "error", or "not_found"), jobId, records,\
  %n      pagination ({offset, limit, loadedCount, hasMore, complete}),\
  %n      exitCode (if complete), stderr (if any), stdout (for stdout-mode jobs, if complete)\
  %n\
  %n  job.cancel:\
  %n    Cancel a running job\
  %n    Parameters:\
  %n      - jobId (string, required)\
  %n        Job ID to cancel\
  %n    Response: success, jobId, message\
  %n\
  %n  job.getStatus:\
  %n    Get the status of a single job\
  %n    Parameters:\
  %n      - jobId (string, required)\
  %n        Job ID to query\
  %n    Response:\
  %n      jobId, status ("running", "complete", "error", or "not_found"),\
  %n      description, completed, exitCode, cached, createdMillis\
  %n\
  %n  job.remove:\
  %n    Remove a completed job from tracking and clear its record cache\
  %n    Parameters:\
  %n      - jobId (string, required)\
  %n        Job ID to remove (must be completed; cancel running jobs first)\
  %n    Response: success, jobId, message\
  %n\
  %n  job.list:\
  %n    List all tracked jobs\
  %n    Parameters: none\
  %n    Response: jobs (array of {jobId, description, completed, exitCode, createdMillis}), totalJobs\
  %n\
  %n- RPC METHODS (rpc.*):\
  %n\
  %n  rpc.listMethods:\
  %n    List all available RPC methods with descriptions\
  %n    Parameters: none\
  %n    Response: methods (array of {name, description}), count\
  %n\
  %nPUSH NOTIFICATIONS (server-to-client, no id field):\
  %n%n\
  The fcli.execute and fn.call methods are asynchronous by default and return immediately with a jobId. \
  Use the wait parameter to block until completion and receive results inline instead. \
  In async mode (default), with push: true, the following notifications are actively pushed to the \
  client during job execution. Set push: false to disable all push notifications and use \
  job.getStatus / job.getPage for polling instead.%n\
  %n  - job.started: Sent when a job begins execution (params: jobId, description)\
  %n  - job.records: Batch of records produced by a running job (params: jobId, records, count)\
  %n  - job.progress: Progress message from a running job (params: jobId, message)\
  %n  - job.complete: Sent when a job finishes (params: jobId, exitCode, stderr?, stdout?)\
  %n%n\
  TYPICAL WORKFLOW:\
  %n%n\
  1. Establish fcli sessions using standard fcli session login commands via fcli.execute%n\
  2. Execute commands and functions via fcli.execute and fn.call (async by default; use wait param for sync)%n\
  3. Listen for push notifications (job.started, job.records, job.complete)\
  %n%n\
  EXAMPLE JSON-RPC REQUESTS:%n\
  %n{"jsonrpc":"2.0","method":"fcli.execute","params":{"command":"ssc appversion list","collectRecords":true},"id":1}\
  %n{"jsonrpc":"2.0","method":"fcli.execute","params":{"command":"ssc appversion list","collectRecords":true,"wait":true},"id":2}\
  %n{"jsonrpc":"2.0","method":"fcli.execute","params":{"command":"ssc appversion list","wait":{"timeout":"30s"}},"id":3}\
  %n{"jsonrpc":"2.0","method":"job.getPage","params":{"jobId":"<jobId from above>","offset":0,"limit":100},"id":4}\
  %n{"jsonrpc":"2.0","method":"job.list","id":5}\
  %n{"jsonrpc":"2.0","method":"fcli.getCommandDetails","params":{"command":"ssc appversion list"},"id":6}\
  %n{"jsonrpc":"2.0","method":"rpc.listMethods","id":7}
fcli.util.rpc-server.start.import = Action YAML files to import. Exported functions are accessible via the fn.call and fn.list RPC methods.
fcli.util.rpc-server.start.async-bg-threads = Number of background threads for running async jobs. Increase if IDE clients submit many concurrent async commands. Default: 4.

# fcli util sample-data
fcli.util.sample-data.usage.header = (INTERNAL) Generate sample data
fcli.util.sample-data.usage.description = These commands generate and output a fixed set of sample data \
  to allow for demonstrating and testing generic fcli functionality like the various output and query options. \
  The output is guaranteed to be the same on each invocation for a given fcli version, but output may vary \
  between different fcli versions.        
fcli.util.sample-data.list.usage.header = (INTERNAL) Generate a list of sample data records
fcli.util.sample-data.list.usage.description = This commands generates a fixed set of sample data \
  to allow for demonstrating and testing generic fcli functionality like the various output and query options. \
  The output is guaranteed to be the same on each invocation for a given fcli version, but output may vary \
  between different fcli versions.
fcli.util.sample-data.get.usage.header = (INTERNAL) Retrieve a single sample data record
fcli.util.sample-data.list.usage.description = This commands retrieves a single record from the fixed set of \
  sample data to allow for demonstrating and testing generic fcli functionality like the various output options. \
  The output is guaranteed to be the same on each invocation for a given fcli version and a given record id, but \
  output may vary between different fcli versions.   
fcli.util.sample-data.id = Sample data record id

# fcli util state
fcli.util.state.usage.header = Manage fcli state data.
fcli.util.state.usage.description = The commands in this module allow for managing fcli state, like clearing all state data. 
fcli.util.state.clear.usage.header = Clear all fcli state data.
fcli.util.state.clear.usage.description = This command deletes all state data from the fcli data directory. This includes variable data and session data. As a best practice, you should log out of existing sessions before running this command to perform proper session cleanup. This command does not clear fcli configuration data; please use the 'fcli config clear' command for clearing configuration data. 
fcli.util.state.clear.confirm = Confirm deleting all fcli state.

