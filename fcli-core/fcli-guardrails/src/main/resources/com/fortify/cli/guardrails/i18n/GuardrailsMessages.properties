usage.description =

fcli.guardrails.usage.header = Run local Fortify SAST scans against source code with a downloaded rulepack.
fcli.guardrails.usage.description.0 = This command runs sourceanalyzer locally in three steps: clean, translate, and scan.
fcli.guardrails.usage.description.1 = Provide a rulepack path downloaded from update.fortify.com and a local source path to scan.
fcli.guardrails.usage.description.2 = A local FPR file is generated and can be reviewed in Audit Workbench or uploaded to SSC/FoD workflows.
fcli.guardrails.rulepack = Path to a local Fortify rulepack file or directory downloaded from update.fortify.com.
fcli.guardrails.source = Path to local source code file or directory to analyze.
fcli.guardrails.output = Path to write the generated FPR file.
fcli.guardrails.build-id = Build session identifier used by sourceanalyzer.
fcli.guardrails.workdir = Working directory for sourceanalyzer execution.
fcli.guardrails.sourceanalyzer = Optional sourceanalyzer executable path. Defaults to registered installation or PATH.
fcli.guardrails.translate-args = Comma-separated extra arguments passed to the translate step.
fcli.guardrails.scan-args = Comma-separated extra arguments passed to the scan step.
