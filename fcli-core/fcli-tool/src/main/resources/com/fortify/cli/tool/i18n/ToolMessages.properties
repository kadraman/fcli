# Make sure none of the commands inherit usage header or description of the top-level fcli command
# Note that we define these as usage.* whereas our parent bundle defines fcli.usage.* (with fcli prefix).
# For some reason, overriding fcli.usage.* doesn't work.
usage.header =
usage.description =

# fcli tool
fcli.tool.usage.header = Install and manage other Fortify tools and utilities.
fcli.tool.usage.description = The commands in this module allow for installing, managing, and running Fortify \
  tools like ScanCentral Client and Fortify Bug Tracker Utility.\
  \n\nNote that if you are looking for an easy way to set up Fortify tools, please consider using the \
  'fcli tool env init' command instead, which provides a higher-level interface for setting up Fortify tools \
  and automatically detects environment characteristics.

# Generic option descriptions
fcli.tool.install.platform = By default, fcli will try to install tool binaries that match the current operating system \
  & architecture. Use this option to override automatic platform detection. The list-platforms command lists available \
  platforms.
fcli.tool.install.version = Tool version to install; see output of list command to view available versions. \
  Default value: ${DEFAULT-VALUE} 
fcli.tool.install.install-dir = Tool installation directory. As described above, it is recommended to use \
  --base-dir instead for manual installations.
fcli.tool.install.base-dir = Base directory under which the tool will be installed.
fcli.tool.install.on-digest-mismatch = Action to take if there is a digest mismatch. Allowed values: \
  ${COMPLETION-CANDIDATES}. Default action is to fail. 
fcli.tool.install.uninstall = Uninstall the given versions while installing the new version. Accepts \
  'all' to uninstall all existing versions, or a comma-separated list of version numbers. Version numbers may be \
  specified as <major>[.<minor>[.<patch>]].
fcli.tool.install.global-bin = By default, wrapper scripts will be installed to <base-dir>/bin; use --no-global-bin \
  to skip installing/updating these wrapper scripts.
fcli.tool.install.copy-if-matching = (Internal use only - used by 'fcli tool env init' command) Copy tool from existing \
  installation instead of downloading, but only if the detected version matches the requested version. \
  Specify path to tool binary, bin directory, or install directory. Version is auto-detected from source. \
  If version doesn't match, falls back to downloading.
fcli.tool.uninstall.versions = One or more tool version to uninstall. Accepts \
  'all' to uninstall all existing versions, or a comma-separated list of version numbers. Version numbers may be \
  specified as <major>[.<minor>[.<patch>]].
fcli.tool.list-platforms.version = Tool version for which to list available platforms.
fcli.tool.install.confirmPrompt = Actions to be performed: %s\nConfirm?
fcli.tool.definitions.update.definitions-source = URL or file to get the tool definitions from. If not specified, \
  default tool definitions provided by OpenText are downloaded from a predefined URL.
fcli.tool.definitions.update.force = Update the tool definitions even if they are up-to-date.
fcli.tool.definitions.update.max-age = Only update tool definitions if the current definitions are older \
  than the specified maximum age, for example 1m (1 minute), 4h (4 hours) or 1d (1 day), to avoid \
  downloading the definitions multiple times in a short period of time. Default value: ${DEFAULT-VALUE} 
fcli.tool.run.version = Tool version to run. The specified tool version must have been previously installed using \
  the 'install' command. Default value: the tool version that was last installed.
fcli.tool.run.workdir = The working directory from where the tool should be invoked. Default value: current \
  working directory.
fcli.tool.run.tool-args = The arguments to be passed to the tool. 
fcli.tool.run.java.use-shell = Whether to use a shell to run the wrapper script provided by this tool, or to use \
  a direct Java invocation. Using a shell provides the same behavior as manually invoking the wrapper script from \
  the command line, but may cause issues if no (compatible) shell is available on the system or in a Docker container. \
  Using a direct Java invocation may cause slightly different tool behavior, but will also work if no compatible shell \
  is available and allows for consistent lookup of the appropriate JRE to use, independent of how the wrapper script \
  performs such a JRE lookup. Allowed values: ${COMPLETION-CANDIDATES}. Default value: ${DEFAULT-VALUE}, which will \
  first try to run the wrapper script, and fall back to direct Java invocation if shell invocation fails.
fcli.tool.register.path = One or more paths to search for the tool binary, separated by the platform path \
  separator (e.g., ':' on Unix, ';' on Windows, like PATH environment variable). Each path entry can point \
  to tool executable, tool bin directory, or tool installation directory. See command description for details \
  on single vs. multiple path behavior.
fcli.tool.register.version = Required version or alias. The detected version must match the latest version \
  for the specified alias. For example, if '2' is an alias for version 2.12.3 in tool definitions, \
  the detected version must be exactly 2.12.3. Use '2.1' for 2.1.x latest, or exact version like '2.1.0'. \
  Both 'v' prefix and plain numbers are supported. Default value: ${DEFAULT-VALUE}
fcli.tool.env.tools = Comma-separated list of tool selectors in the form <tool-name>[:<version>]. Version selectors \
  accept exact versions, aliases, partial semantic versions like '3' or '3.1', and '*' or 'all' to include every \
  installed version. Defaults to the last installed version for each tool when omitted.
fcli.tool.env.exclude = Comma-separated list of values to exclude from output. Allowed values: path, vars. Default: (none).
fcli.tool.get.version = Tool version to get information about.

fcli.tool.uninstall.confirmPrompt = Actions to be performed: %s\nConfirm?

fcli.tool.install.generic-description = This command allows for fine-grained control over tool installation and upgrade. \
  If you are looking for a simpler way to set up Fortify tools, please consider using the 'fcli tool env init' \
  command instead, which provides a higher-level interface for setting up Fortify tools and automatically detects \
  environment characteristics. \
  \n\nBy default, tools are installed to <base-dir>/<tool-name>/<version>. The base directory can be specified using \
  the --base-dir option, defaulting to <user.home>/fortify/tools if not specified. Unless the --no-global-bin option \
  is specified, wrapper scripts for invoking each tool will be installed to <base-dir>/bin, allowing users to add this \
  single directory to the system PATH for easy invocation of all installed tools if you like invoking those tools directly. \
  Note however that tools installed through fcli can also be invoked through the 'fcli tool <tool-name> run' command, \
  allowing to run either last installed version or a specific version without needing to modify the system PATH or having \
  to remember the installation directory. \
  \n\nIt is also possibly to specify an explicit installation directory through the --install-dir option, for example \
  to install the tool to a specific location that will be cached by a CI/CD system. The --install-dir option doesn't \
  create the <base-dir>/<tool-name>/<version> directory structure, and doesn't install wrapper scripts to a shared \
  bin-directory. \
  \n\nWhen installing a new version, older versions can optionally be automatically un-installed using the --uninstall \
  option, which is basically the equivalent of a tool upgrade. When trying to install a version that's already been installed, \
  only some post-installation tasks will be re-run, like installing the global bin scripts and performing any tool \
  configuration if applicable. \
  \n\nSample invocations: \
  \n\nInstall latest tool version, keep older versions: \
  \n  fcli tool <name> install -v latest \
  \n\nInstall latest tool version (only re-running post-install if already existing), uninstall all other tool versions: \
  \n  fcli tool <name> install -v latest --uninstall all \
  \n\nInstall latest v2 version, uninstall all other v2 versions: \
  \n  fcli tool <name> install -v 2 --uninstall 2 \
  \n\nInstall latest and latest v1, have global bin-scripts point to latest: \
  \n  fcli tool <name> install -v latest \
  \n  fcli tool <name> install -v 1 --no-global-bin \
  \n\nEach tool installation includes shell scripts or executables that can be run as usual, however tools installed \
  through the 'fcli tool <tool-name> install' command can also be run through the 'fcli tool <tool-name> run' command. \
  This command allows for selecting which version of a tool to run if multiple versions have been installed, and \
  allows for easy tool invocation even if they haven't been added to the PATH.
  
fcli.tool.uninstall.generic-global-bin-description = Note that global bin scripts, if installed, will not be updated \
  or removed by this command. If you un-install the version to which the global bin-script is currently pointing, \
  the global bin script will cease functioning. To update the global bin script to point to an existing version, \
  please use the install command.
  
fcli.tool.register.generic-description = This command registers an existing tool \
  installation (whether installed through fcli or externally), allowing fcli to reference this tool installation in \
  CI/CD integrations and other contexts.\n\n\
  PATH SEARCH BEHAVIOR:\n\
  When a single path is provided (no path separator), fcli uses that exact installation without searching \
  other locations. This ensures that when using environment variables like *_HOME, the specific installation \
  is registered. An error is thrown if the tool is not found at that path or if the version doesn't match \
  the requested version.\n\n\
  When multiple paths are provided (separated by ':' on Unix or ';' on Windows), fcli first checks if a \
  matching version is already registered. If found, that existing installation is re-registered (updating its \
  timestamp to make it the default). Only if no matching registered installation exists will fcli search the \
  provided paths in order.\n

#fcli tool definitions
fcli.tool.definitions.generic-description = Tool definitions list the available versions, corresponding download \
  location, and other details for each tool. These tool definitions are used by the various 'fcli tool' commands \
  to identify what tool versions are currently available and where to download them from. By default, each fcli \
  release ships with the latest tool definitions that were available at the time that release was built.  
fcli.tool.definitions.usage.header = Manage tool definitions.
fcli.tool.definitions.usage.description.0 = ${fcli.tool.definitions.generic-description}\n
fcli.tool.definitions.usage.description.1 = The commands in this module allow for managing tool definitions, like \
  updating tool definitions from a URL or local file. 
fcli.tool.definitions.list.usage.header = List tool definitions.
fcli.tool.definitions.update.usage.header = Update tool definitions.
fcli.tool.definitions.update.usage.description.0 = ${fcli.tool.definitions.generic-description}\n
fcli.tool.definitions.update.usage.description.1 = The update command allows for updating the tool definitions from \
  a URL or local file. This allows for the current fcli installation to be aware of new tool versions that were \
  released after the current fcli release was built, and also allows users to use a custom tool definitions bundle.\n
fcli.tool.definitions.update.usage.description.2 = For example, if it's not allowed to download tool \
  installation bundles from public sites like github.com or tools.fortify.com, companies can host tool installation \
  bundles internally and provide a tool definitions bundle that points to the internally hosted installation bundles. \
  At the same time, companies can restrict which versions of each tool users are allowed to install.
fcli.tool.definitions.reset.usage.header = Reset tool definitions.
fcli.tool.definitions.reset.usage.description = This command removes any tool definition updates, reverting to \
  the tool definitions originally shipped with this fcli release. 

# fcli tool env init
fcli.tool.env.init.usage.header = Initialize Fortify tool environment.
fcli.tool.env.init.usage.description = Detects, registers, and installs Fortify tools. Supports auto-detection of \
  pre-installed tools, dynamic installation with signature verification, platform-specific tool caching, air-gapped \
  environments, and Docker multi-stage builds.\n\
  \n\
  The --tools option specifies which tools to set up, along with optional version or path specifiers. The following \
  tools are supported: ${fcli.tools.supported}.\n\
  \n\
  `<tool>:<path>`\n\
  Register existing tool installation at given path, fail if path does not exist or does not contain expected tool binary.\n\
  \n\
  `<tool>:<version>`\n\
  Register existing installation if matching version is found in previously installed versions or on system PATH (resolving \
  semantic version aliases like 'latest'), otherwise download and install requested version.\n\
  \n\
  `<tool>` OR `<tool>:auto`\n\
  Check for `<TOOL_ENV_PREFIX>_HOME` or `<TOOL_ENV_PREFIX>_VERSION` environment variables to determine version or path, with same \
  behavior as above. If neither environment variable is specified, attempts to register any available version from previously \
  installed versions or first match in system PATH. If no existing installation is found, installs 'latest' version.\n\
  \n\
  Following shows the exact environment variables that will be checked for each supported tool:\n\
  - fcli:\
  \n    ${fcli.tool.fcli.envPrefix}_VERSION, ${fcli.tool.fcli.envPrefix}_HOME\n\
  - sc-client: \
  \n    ${fcli.tool.sc-client.envPrefix}_VERSION, ${fcli.tool.sc-client.envPrefix}_HOME\n\
  - fod-uploader: \
  \n    ${fcli.tool.fod-uploader.envPrefix}_VERSION, ${fcli.tool.fod-uploader.envPrefix}_HOME\n\
  - debricked-cli: \
  \n    ${fcli.tool.debricked-cli.envPrefix}_VERSION, ${fcli.tool.debricked-cli.envPrefix}_HOME\n\
  - bugtracker-utility: \
  \n    ${fcli.tool.bugtracker-utility.envPrefix}_VERSION, ${fcli.tool.bugtracker-utility.envPrefix}_HOME\n\
  - vuln-exporter: \
  \n    ${fcli.tool.vuln-exporter.envPrefix}_VERSION, ${fcli.tool.vuln-exporter.envPrefix}_HOME\n\
  \n\
  For ScanCentral Client, the init command will look for a compatible JRE based on the following environment variables \
  (in this order):\n\
  - ${fcli.tool.sc-client.envPrefix}_JAVA_HOME\n\
  - SCANCENTRAL_JAVA_HOME\n\
  - JAVA_HOME_<version>_<arch> (e.g., JAVA_HOME_17_X86_64, JAVA_HOME_17_AMD64, or JAVA_HOME_17_X64 for GitHub Actions)\n\
  - JAVA_HOME_<version> (e.g., JAVA_HOME_17, JAVA_HOME_11)\n\
  \n\
  If no compatible JRE is found through these environment variables, a compatible JRE will be downloaded and installed. \
  Note that we specifically do not look for the general `JAVA_HOME` environment variable, as that may point to an incompatible \
  JRE version, or may change to a different JRE version over time, causing potential compatibility issues with ScanCentral Client.
fcli.tool.env.init.tools = Comma-separated list of tools to set up in the format <tool>[:<version>|<path>]. Examples: \
  sc-client, fcli:v3, debricked-cli:/opt/debricked. If a tool is not listed, it will be skipped. Supported tools: \
  ${fcli.tools.supported}.
fcli.tool.env.init.preinstalled = Preinstalled mode: all tools must be pre-installed, don't update tool definitions. Can also be enabled via PREINSTALLED environment variable.
fcli.tool.env.init.tool-definitions = Custom tool definitions URL or file path. Defaults to TOOL_DEFINITIONS environment variable if set, otherwise uses built-in default. Ignored if all tools have explicit paths or preinstalled mode is enabled.
fcli.tool.env.init.base-dir = Base directory for tool installations: <base-dir>/<tool>/<version>/.
fcli.tool.env.init.self = Path to bootstrapped fcli executable. Not intended for end users; typically set by platform integration tools.
fcli.tool.env.init.install-dir-pattern = Pattern for tool cache directory paths, with {tool} and {version} placeholders (e.g., /cache/{tool}/{version}). When specified, semantic versions are resolved to actual versions for proper cache naming.

# fcli tool env
fcli.tool.env.usage.header = Initialize and manage tool environment.
fcli.tool.env.usage.description = The 'fcli tool env' commands provide a unified interface for setting up Fortify tools \
  and generating environment configurations. Use 'fcli tool env init' to detect, register, and install tools, then use \
  the format-specific commands (shell, github, ado, etc.) to emit environment variables and PATH updates for one or more \
  Fortify tool installations.
fcli.tool.env.shell.usage.header = Emit POSIX shell exports.
fcli.tool.env.shell.usage.description = Produces export statements for PATH and tool-specific variables. Use --file to append \
  the output to a script.
fcli.tool.env.powershell.usage.header = Emit PowerShell assignments.
fcli.tool.env.powershell.usage.description = Produces PowerShell expressions for PATH updates and tool variables. Use --file to \
  capture the output.
fcli.tool.env.github.usage.header = Append to GitHub Actions environment files.
fcli.tool.env.github.usage.description = Writes PATH entries to $GITHUB_PATH and environment variables to $GITHUB_ENV. Both \
  environment variables must be set by the workflow.
fcli.tool.env.gitlab.usage.header = Write to a GitLab environment file.
fcli.tool.env.gitlab.usage.description = Generates PATH and variable entries in KEY=VALUE format. Use --file to point to the \
  GitLab-provided environment file.
fcli.tool.env.ado.usage.header = Emit Azure DevOps logging commands.
fcli.tool.env.ado.usage.description = Outputs ##vso commands that prepend PATH entries and set variables for subsequent tasks.
fcli.tool.env.expr.usage.header = Evaluate custom template expressions.
fcli.tool.env.expr.usage.description = Evaluates one or more template expressions against the selected installations. Combine \
  results with --join and optionally write to a file.
fcli.tool.env.shell.file = File to append generated shell exports to. Omit to write directly to standard output.
fcli.tool.env.powershell.file = File to append generated PowerShell assignments to. Omit to write directly to standard output.
fcli.tool.env.expr.file = File to append rendered expressions to. Omit to write directly to standard output.
fcli.tool.env.gitlab.file = Path to the GitLab-provided environment file that should receive the generated entries.
fcli.tool.env.expr.expressions = Template expression evaluated for each tool installation. Access fields like {installDir}, {binDir}, {cmd}, \
  {version}, {defaultEnvPrefix}, and {aliases}. Specify the option multiple times to render multiple expressions.
fcli.tool.env.expr.joiner = Separator used when combining expression results across installations. Supports escape sequences such as \
  \n and \t. Default value: \n.
fcli.tool.env.expr.writeMode = File write mode when --file is specified. Allowed values: append|overwrite. Default: append.
fcli.tool.env.expr.expr = Template expression evaluated for each tool installation. Access fields like {installDir}, {binDir}, {cmd}, \
  {version}, {defaultEnvPrefix}, and {aliases}. Specify the option multiple times to render multiple expressions.
fcli.tool.env.expr.join = Separator used when combining expression results across installations. Supports escape sequences such as \
  \\n and \\t. Default value: \\n.
fcli.tool.env.expr.write-mode = File write mode when --file is specified. Allowed values: append|overwrite. Default: append.

# fcli tool bugtracker-utility
fcli.tool.bugtracker-utility.usage.header = Manage FortifyBugTrackerUtility installations.
fcli.tool.bugtracker-utility.usage.description = For more information about FortifyBugTrackerUtility, please see the source code repository at https://github.com/fortify-ps/FortifyBugTrackerUtility.
fcli.tool.bugtracker-utility.install.usage.header = Download and install FortifyBugTrackerUtility.
fcli.tool.bugtracker-utility.install.usage.description = ${fcli.tool.install.generic-description}
fcli.tool.bugtracker-utility.install.confirm = Automatically confirm all prompts (cleaning the target directory, uninstalling other versions).
fcli.tool.bugtracker-utility.list.usage.header = List available and installed FortifyBugTrackerUtility versions.
fcli.tool.bugtracker-utility.list.usage.description = Use the 'fcli tool definitions update' command to update the list of available versions.
fcli.tool.bugtracker-utility.list-platforms.usage.header = List available platforms for FortifyBugTrackerUtility
fcli.tool.bugtracker-utility.get.usage.header = Get information about a specific FortifyBugTrackerUtility version.
fcli.tool.bugtracker-utility.get.usage.description = This command retrieves detailed information about a specific FortifyBugTrackerUtility version, \
  including available platforms and installation status.
fcli.tool.bugtracker-utility.register.usage.header = Register an external FortifyBugTrackerUtility installation.
fcli.tool.bugtracker-utility.register.usage.description.0 = ${fcli.tool.register.generic-description}
fcli.tool.bugtracker-utility.register.usage.description.1 = Examples:\n\
  \  --path /opt/fortify/tools/bugtracker-utility/bin\n\
  \  --path $BUGTRACKER_UTILITY_HOME\n\
  \  --path $PATH\n\
  \  --path $BUGTRACKER_UTILITY_HOME:$PATH\n

fcli.tool.bugtracker-utility.run.usage.header = Run FortifyBugTrackerUtility
fcli.tool.bugtracker-utility.run.usage.description = This command allows for running FortifyBugTrackerUtility as previously \
  installed through the 'fcli tool bugtracker-utility install' command. It is recommended to use double dashes to separate \
  fcli options from FortifyBugTrackerUtility options, i.e., 'fcli tool bugtracker-utility run <fcli options> -- \
  <FortifyBugTrackerUtility options>' to explicitly differentiate between fcli options and FortifyBugTrackerUtility options.
fcli.tool.bugtracker-utility.uninstall.usage.header = Uninstall FortifyBugTrackerUtility.
fcli.tool.bugtracker-utility.uninstall.usage.description = This command removes one or more FortifyBugTrackerUtility installations that were previously installed using the 'fcli tool bugtracker-utility install' command. ${fcli.tool.uninstall.generic-global-bin-description} 
fcli.tool.bugtracker-utility.uninstall.confirm = Confirm removal of FortifyBugTrackerUtility.

