# fcli tool sc-client
fcli.tool.sc-client.usage.header = Manage ScanCentral SAST Client installations.
fcli.tool.sc-client.install.usage.header = Download and install ScanCentral SAST Client.
fcli.tool.sc-client.install.usage.description = Note: Use 'fcli sc-sast sensor list' to determine compatible sc-client versions \
  (either globally, for a specific sensor pool, or for a specific application version).\
  \n\n${fcli.tool.install.generic-description}
fcli.tool.sc-client.install.confirm = Automatically confirm all prompts (cleaning the target directory, uninstalling other versions).
fcli.tool.sc-client.install.client-auth-token = ScanCentral SAST client_auth_token used for authenticating with ScanCentral SAST Controller.
fcli.tool.sc-client.install.with-jre = Install compatible JRE into the ScanCentral Client JRE directory, allowing ScanCentral Client to run even if no (compatible) JRE is installed elsewhere on the system. If neither --with-jre nor --jre is specified, fcli will automatically detect a compatible JRE from environment variables (SC_CLIENT_JAVA_HOME, SCANCENTRAL_JAVA_HOME, JAVA_HOME_<version>_<arch>, or JAVA_HOME_<version>). If no compatible JRE is found, fcli will automatically install an embedded JRE as if --with-jre was specified. Use --no-with-jre to explicitly skip embedded JRE installation and rely on environment-based JRE detection at runtime (including JAVA_HOME and PATH fallback).
fcli.tool.sc-client.install.jre-platform = Specify the platform for which to install the JRE, implies --with-jre. See \
  https://github.com/fortify/tool-definitions/blob/main/v1/jre.yaml for available platforms. Default value: current platform.
fcli.tool.sc-client.install.jre = Path to an existing JRE installation directory to use with ScanCentral Client. The JRE version must be compatible \
  with the ScanCentral Client version being installed (typically Java 17 for recent versions). This option is mutually exclusive with --with-jre \
  and --jre-platform. When specified, the JRE location is stored in the installation descriptor and will always be used by the 'fcli tool \
  sc-client run' command. If neither --with-jre nor --jre is specified, fcli will automatically detect a compatible JRE from environment variables; \
  see --with-jre for details.
fcli.tool.sc-client.get.usage.header = Get information about a specific ScanCentral SAST Client version.
fcli.tool.sc-client.get.usage.description = This command retrieves detailed information about a specific ScanCentral Client version, \
  including required JRE version, available platforms, and installation status. Use the output to determine compatibility requirements \
  before installing or to query version metadata for CI/CD workflows.
fcli.tool.sc-client.list.usage.header = List available and installed ScanCentral SAST Client versions.
fcli.tool.sc-client.list.usage.description = Use the 'fcli tool definitions update' command to update the list of available versions.
fcli.tool.sc-client.list-platforms.usage.header = List available platforms for ScanCentral SAST Client.
fcli.tool.sc-client.register.usage.header = Register an external ScanCentral SAST Client installation.
fcli.tool.sc-client.register.usage.description.0 = ${fcli.tool.register.generic-description}
fcli.tool.sc-client.register.usage.description.1 = Examples:\n\
  \  --path /opt/fortify/tools/scancentral/bin\n\
  \  --path $SCANCENTRAL_HOME\n\
  \  --path $PATH\n\
  \  --path $SCANCENTRAL_HOME:$PATH\n

fcli.tool.sc-client.run.usage.header = Run ScanCentral Client.
fcli.tool.sc-client.run.usage.description = This command allows for running ScanCentral Client as previously \
  installed through the 'fcli tool sc-client install' command. It is recommended to use double dashes to separate \
  fcli options from ScanCentral Client options, i.e., 'fcli tool sc-client run <fcli options> -- <ScanCentral Client options>' \
  to explicitly differentiate between fcli options and ScanCentral Client options.\n\
  \n\
  JRE RESOLUTION:\n\
  The command determines which JRE to use based on how the installation was configured:\n\
  \n\
  - Explicit JRE (--jre): Always uses the exact path specified during installation; fails if path no longer exists\n\
  - Embedded JRE (--with-jre): Always uses the embedded JRE installed with ScanCentral Client\n\
  - Auto-detected JRE (no --jre or --with-jre): Re-checks environment variables on each run to detect JRE upgrades:\n\
    1. SC_CLIENT_JAVA_HOME environment variable\n\
    2. SCANCENTRAL_JAVA_HOME environment variable\n\
    3. JAVA_HOME_<version>_<arch> patterns (e.g., JAVA_HOME_17_X86_64, JAVA_HOME_17_X64 for GitHub Actions)\n\
    4. JAVA_HOME_<version> patterns (e.g., JAVA_HOME_17, JAVA_HOME_11)\n\
    5. JAVA_HOME environment variable (fallback)\n\
    6. Stored path from installation (if env vars not set)\n\
    7. Java from system PATH\n\
  \n\
  The detected JAVA_HOME is automatically set as SCANCENTRAL_JAVA_HOME in the process environment for ScanCentral Client to use.
fcli.tool.sc-client.run.logdir = Directory where to store ScanCentral Client log files
fcli.tool.sc-client.run.debug = Enables both fcli trace logging and the ScanCentral Client -debug option 
fcli.tool.sc-client.uninstall.usage.header = Uninstall ScanCentral SAST Client.
fcli.tool.sc-client.uninstall.usage.description = This command removes one or more ScanCentral Client installations that were previously installed using the 'fcli tool sc-client install' command. ${fcli.tool.uninstall.generic-global-bin-description}
fcli.tool.sc-client.uninstall.confirm = Confirm removal of ScanCentral SAST Client.

